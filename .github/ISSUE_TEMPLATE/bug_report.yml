name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this bug!

  - type: input
    id: version
    attributes:
      label: zsasa Version
      description: Output of `zsasa --version` or `python -c "import zsasa; print(zsasa.get_version())"`
      placeholder: "0.7.1"
    validations:
      required: true

  - type: input
    id: zig-version
    attributes:
      label: Zig Version (source builds only)
      description: Output of `zig version`, or "not installed" for wheels/binaries
      placeholder: "0.16.0 or not installed"
    validations:
      required: false

  - type: dropdown
    id: install-method
    attributes:
      label: Installation Method
      options:
        - PyPI wheel / pip / uv
        - install.sh binary download
        - install.sh source build
        - Zig source build
        - Homebrew
        - Scoop
        - conda-forge
        - Docker
        - Other
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Linux (x86_64)
        - Linux (aarch64)
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Windows
        - Windows (WSL)
        - Other
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of zsasa is affected?
      options:
        - CLI (zsasa binary)
        - Python bindings
        - Shrake-Rupley algorithm
        - Lee-Richards algorithm
        - File parsing (PDB/mmCIF/BinaryCIF/SDF/MOL/JSON)
        - Trajectory parsing (XTC/TRR/DCD/AMBER NetCDF)
        - Batch processing
        - Packaging / installation
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the behavior
      placeholder: |
        1. Run `zsasa calc input.cif output.json`
        2. See error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened (include error messages or stack traces)
    validations:
      required: true

  - type: textarea
    id: input
    attributes:
      label: Input File
      description: If applicable, attach or paste a minimal input file that triggers the bug
      render: text
    validations:
      required: false
