name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - '.gitignore'
      - 'docs/**'
      - 'plans/**'
      - 'benchmarks/**'
      - 'website/**'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'plans/**'
      - 'benchmarks/**'
      - 'website/**'
      - 'LICENSE'
  workflow_dispatch:  # Allow manual triggers

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fmt:
    runs-on: ubuntu-latest
    name: Format check
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Check formatting
        run: zig fmt --check src/

  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux
            binary: zsasa
          - os: macos-latest
            name: macOS
            binary: zsasa

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.name }})
    needs: [fmt]
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Run tests
        run: zig build test

      - name: Build Release
        run: zig build -Doptimize=ReleaseFast

      - name: Check binary exists
        shell: bash
        run: |
          if [ -f "./zig-out/bin/${{ matrix.binary }}" ]; then
            echo "Binary built successfully"
            ls -la ./zig-out/bin/${{ matrix.binary }}
          else
            echo "Binary not found"
            exit 1
          fi

      - name: Test CLI
        shell: bash
        run: |
          ./zig-out/bin/${{ matrix.binary }} --help
          ./zig-out/bin/${{ matrix.binary }} --version

  validate:
    runs-on: ubuntu-latest
    name: Validate example
    needs: [fmt, build]
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Build
        run: zig build -Doptimize=ReleaseFast

      - name: Run with example input
        run: |
          ./zig-out/bin/zsasa calc examples/1ubq.pdb /tmp/output.json
          cat /tmp/output.json | head -20

      - name: Validate output format
        run: |
          python3 -c "
          import json
          with open('/tmp/output.json') as f:
              data = json.load(f)
          assert 'total_area' in data, 'Missing total_area'
          assert 'atom_areas' in data, 'Missing atom_areas'
          assert isinstance(data['total_area'], (int, float)), 'total_area should be number'
          assert isinstance(data['atom_areas'], list), 'atom_areas should be list'
          # 1UBQ has 602 atoms
          assert len(data['atom_areas']) > 500, f'Expected >500 atoms, got {len(data[\"atom_areas\"])}'
          print(f'Validation passed: total_area={data[\"total_area\"]:.2f}, atoms={len(data[\"atom_areas\"])}')"

      - name: Test CSV output
        run: |
          ./zig-out/bin/zsasa calc --format=csv examples/1ubq.pdb /tmp/output.csv
          head -5 /tmp/output.csv
          tail -3 /tmp/output.csv

      - name: Test validate mode
        run: ./zig-out/bin/zsasa calc --validate examples/1ubq.pdb

  source_install:
    runs-on: ubuntu-latest
    name: Source install smoke
    needs: [fmt]
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build sdist
        working-directory: python
        run: |
          python -m pip install --upgrade pip build
          python -m build --sdist

      - name: Install from sdist and smoke test
        shell: bash
        run: |
          python -m venv /tmp/zsasa-sdist-smoke
          . /tmp/zsasa-sdist-smoke/bin/activate
          python -m pip install --upgrade pip
          python -m pip install python/dist/zsasa-*.tar.gz
          zsasa --version
          python - <<'PY_SMOKE'
          import numpy as np
          from zsasa import calculate_sasa, get_version

          coords = np.array([[0.0, 0.0, 0.0], [3.0, 0.0, 0.0]])
          radii = np.array([1.5, 1.5])
          result = calculate_sasa(coords, radii)
          assert get_version()
          assert result.total_area > 0
          PY_SMOKE

  python:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux
            lib: libzsasa.so
            lib_dir: lib
          - os: macos-latest
            name: macOS
            lib: libzsasa.dylib
            lib_dir: lib

    runs-on: ${{ matrix.os }}
    name: Python (${{ matrix.name }})
    needs: [fmt]
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Build shared library
        run: zig build -Doptimize=ReleaseFast

      - name: Check shared library exists
        shell: bash
        run: |
          if [ -f "./zig-out/${{ matrix.lib_dir }}/${{ matrix.lib }}" ]; then
            echo "Shared library built successfully"
            ls -la ./zig-out/${{ matrix.lib_dir }}/${{ matrix.lib }}
          else
            echo "Shared library not found"
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Python package
        working-directory: python
        run: uv pip install --system -e ".[dev]"

      - name: Run Python tests
        working-directory: python
        run: pytest tests/ -v

      - name: Run linter
        working-directory: python
        run: |
          ruff check zsasa/
          ruff format --check zsasa/

      - name: Test import and basic usage
        shell: bash
        run: |
          python3 -c "
          import numpy as np
          from zsasa import calculate_sasa, get_version

          print(f'Version: {get_version()}')

          # Simple test
          coords = np.array([[0.0, 0.0, 0.0], [3.0, 0.0, 0.0]])
          radii = np.array([1.5, 1.5])

          result = calculate_sasa(coords, radii)
          print(f'Total SASA: {result.total_area:.2f} Å²')
          assert result.total_area > 0, 'SASA should be positive'
          print('Python bindings test passed!')
          "
