name: Docs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - "website/**"
      - "docs/**"
      - "README.md"
      - "python/README.md"
      - "python/examples/README.md"
      - "examples/README.md"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        working-directory: website
        run: npm ci

      - name: Build Zig autodoc
        run: zig build docs

      - name: Build Python autodoc
        working-directory: python
        run: |
          pip install "pdoc>=14.0"
          pip install -e .
          pdoc zsasa --output-dir /tmp/python-autodoc

      - name: Build Docusaurus site
        working-directory: website
        run: npm run build

      - name: Copy benchmark assets into site
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p website/build/benchmarks/results
          for dir in plots md validation validation_md; do
            if [ -d "benchmarks/results/$dir" ]; then
              cp -r "benchmarks/results/$dir" website/build/benchmarks/results/
            fi
          done

      - name: Copy Zig autodoc into site
        if: github.event_name != 'pull_request'
        run: cp -r zig-out/docs website/build/zig-autodoc

      - name: Copy Python autodoc into site
        if: github.event_name != 'pull_request'
        run: cp -r /tmp/python-autodoc website/build/python-autodoc

      - name: Upload artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/build

  deploy:
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
