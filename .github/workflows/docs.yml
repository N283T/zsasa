name: Deploy Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install MkDocs
        run: pip install mkdocs-material

      - name: Build Zig autodoc
        run: zig build docs

      - name: Build MkDocs site
        run: mkdocs build

      - name: Copy benchmark assets into site
        run: |
          mkdir -p site/benchmarks/results
          for dir in plots md validation validation_md; do
            if [ -d "benchmarks/results/$dir" ]; then
              cp -r "benchmarks/results/$dir" site/benchmarks/results/
            fi
          done

      - name: Copy Zig autodoc into site
        run: cp -r zig-out/docs site/zig-autodoc

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
