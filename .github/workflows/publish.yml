name: Build & Publish

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to build/publish (must match vX.Y.Z)"
        required: true
        type: string
      target:
        description: "Publish target"
        required: true
        default: "testpypi"
        type: choice
        options:
          - testpypi
          - pypi
          - none
      jobs:
        description: "Jobs to run (tag push always runs all)"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - pypi
          - github-release
          - docker
          - package-managers

permissions:
  contents: write
  packages: write

jobs:
  prepare:
    name: Resolve release tag
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Resolve and validate release tag
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.release_tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          if ! printf '%s' "${TAG}" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "release_tag must be exactly vX.Y.Z, got '${TAG}'" >&2
            exit 1
          fi

          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Using release tag ${TAG} (version ${VERSION})"

  # ---------- Phase 1: Build everything (preflight) ----------

  build_wheels:
    name: Wheels (${{ matrix.os }})
    needs: [prepare]
    if: >-
      github.event_name == 'push'
      || inputs.jobs == 'all'
      || inputs.jobs == 'pypi'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-15-intel, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Setup Zig
        if: runner.os != 'Linux'
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Cache cibuildwheel
        if: runner.os != 'Linux'
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4
        with:
          path: |
            ~/Library/Caches/cibuildwheel
            ~/AppData/Local/pypa/cibuildwheel/Cache
          key: cibw-${{ runner.os }}-${{ hashFiles('python/pyproject.toml') }}
          restore-keys: cibw-${{ runner.os }}-

      - name: Build wheels
        uses: pypa/cibuildwheel@54a71d3375df80d84b6d4537d04614fec04e637f # v3.4.0
        with:
          package-dir: python

      - name: Upload wheels
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Source dist
    needs: [prepare]
    if: >-
      github.event_name == 'push'
      || inputs.jobs == 'all'
      || inputs.jobs == 'pypi'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Install build
        run: pip install build

      - name: Build sdist
        working-directory: python
        run: python -m build --sdist

      - name: Smoke test sdist source install
        shell: bash
        run: |
          python -m venv /tmp/zsasa-sdist-smoke
          . /tmp/zsasa-sdist-smoke/bin/activate
          python -m pip install --upgrade pip
          python -m pip install python/dist/zsasa-*.tar.gz
          zsasa --version
          python - <<'PY'
          import numpy as np
          from zsasa import calculate_sasa, get_version

          coords = np.array([[0.0, 0.0, 0.0], [3.0, 0.0, 0.0]])
          radii = np.array([1.5, 1.5])
          result = calculate_sasa(coords, radii)
          assert get_version()
          assert result.total_area > 0
          PY

      - name: Upload sdist
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sdist
          path: python/dist/*.tar.gz

  build_cli:
    name: CLI (${{ matrix.target }})
    needs: [prepare]
    if: >-
      github.event_name == 'push'
      || inputs.jobs == 'all'
      || inputs.jobs == 'github-release'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x86_64
            binary: zsasa
          - os: ubuntu-24.04-arm
            target: linux-aarch64
            binary: zsasa
          - os: macos-15-intel
            target: macos-x86_64
            binary: zsasa
          - os: macos-latest
            target: macos-aarch64
            binary: zsasa
          - os: windows-latest
            target: windows-x86_64
            binary: zsasa.exe

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Build CLI
        run: zig build -Doptimize=ReleaseFast

      - name: Smoke test
        shell: bash
        env:
          BINARY: ${{ matrix.binary }}
        run: |
          "./zig-out/bin/${BINARY}" --version

      - name: Package binary
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          BINARY: ${{ matrix.binary }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          ASSET_NAME="zsasa-${VERSION}-${TARGET}"
          mkdir -p dist
          if [ "${TARGET}" = "windows-x86_64" ]; then
            cp "zig-out/bin/${BINARY}" "dist/${ASSET_NAME}.exe"
          else
            cp "zig-out/bin/${BINARY}" "dist/${ASSET_NAME}"
            chmod +x "dist/${ASSET_NAME}"
          fi

      - name: Upload CLI binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: cli-${{ matrix.target }}
          path: dist/zsasa-*

  build_docker:
    name: Docker build (preflight)
    needs: [prepare]
    if: >-
      github.event_name == 'push'
      || inputs.jobs == 'all'
      || inputs.jobs == 'docker'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ghcr.io/n283t/zsasa:preflight

  # ---------- Phase 2: Release (after build gates pass) ----------

  publish:
    name: Publish to PyPI
    needs: [prepare, build_wheels, build_sdist]
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
      || (github.event_name == 'workflow_dispatch' && (inputs.jobs == 'all' || inputs.jobs == 'pypi') && inputs.target != 'none')
    permissions:
      id-token: write
    environment:
      name: ${{ github.event_name == 'push' && 'pypi' || inputs.target }}
      url: ${{ (github.event_name == 'push' || inputs.target == 'pypi') && 'https://pypi.org/p/zsasa' || 'https://test.pypi.org/p/zsasa' }}

    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true

      - name: Download sdist artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: sdist
          path: dist
          merge-multiple: true

      - name: List distributions
        run: ls -la dist/

      - name: Publish to PyPI
        if: github.event_name == 'push' || inputs.target == 'pypi'
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
        with:
          packages-dir: dist/

      - name: Publish to TestPyPI
        if: github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi'
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
        with:
          packages-dir: dist/
          repository-url: https://test.pypi.org/legacy/

  github_release:
    name: GitHub Release
    needs: [prepare, build_cli]
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
      || (github.event_name == 'workflow_dispatch' && (inputs.jobs == 'all' || inputs.jobs == 'github-release'))

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Extract release notes from CHANGELOG
        id: notes
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          NOTES=$(awk "/^## \\[${VERSION}\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" CHANGELOG.md)
          echo "$NOTES" > /tmp/release_notes.md
          if [ ! -s /tmp/release_notes.md ]; then
            echo "No CHANGELOG.md section found for ${VERSION}" >&2
            exit 1
          fi

      - name: Download CLI artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: cli-*
          path: dist
          merge-multiple: true

      - name: Generate CLI checksums
        run: |
          cd dist
          sha256sum zsasa-*-linux-* zsasa-*-macos-* zsasa-*-windows-* > SHA256SUMS 2>/dev/null || true
          if [ ! -s SHA256SUMS ]; then
            echo "No release assets found for checksum generation" >&2
            exit 1
          fi
          cat SHA256SUMS

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          gh release create "${RELEASE_TAG}" \
            --title "${RELEASE_TAG}" \
            --notes-file /tmp/release_notes.md \
            dist/*

  update_homebrew:
    name: Update Homebrew tap
    needs: [prepare, github_release]
    runs-on: ubuntu-latest
    if: >-
      always()
      && needs.prepare.result == 'success'
      && (
        (
          (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
          || (github.event_name == 'workflow_dispatch' && inputs.jobs == 'all')
        )
        && needs.github_release.result == 'success'
        || (github.event_name == 'workflow_dispatch' && inputs.jobs == 'package-managers')
      )

    steps:
      - name: Download checksums
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          gh release download "${RELEASE_TAG}" \
            --repo N283T/zsasa \
            --pattern "SHA256SUMS" \
            --dir .

      - name: Checkout tap repo
        uses: actions/checkout@v4
        with:
          repository: N283T/homebrew-zsasa
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: homebrew-zsasa

      - name: Update Formula
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          FORMULA="homebrew-zsasa/Formula/zsasa.rb"

          LINUX_X86=$(grep "linux-x86_64" SHA256SUMS | awk '{print $1}')
          LINUX_ARM=$(grep "linux-aarch64" SHA256SUMS | awk '{print $1}')
          MACOS_X86=$(grep "macos-x86_64" SHA256SUMS | awk '{print $1}')
          MACOS_ARM=$(grep "macos-aarch64" SHA256SUMS | awk '{print $1}')

          sed -i "s/version \".*\"/version \"${VERSION}\"/" "$FORMULA"

          python3 -c "
          import re
          with open('$FORMULA') as f:
              content = f.read()
          shas = re.findall(r'sha256 \"([a-f0-9]+)\"', content)
          replacements = ['$MACOS_ARM', '$MACOS_X86', '$LINUX_ARM', '$LINUX_X86']
          for old, new in zip(shas, replacements):
              content = content.replace(old, new, 1)
          with open('$FORMULA', 'w') as f:
              f.write(content)
          "

      - name: Commit and push
        working-directory: homebrew-zsasa
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/zsasa.rb
          git diff --cached --quiet && exit 0
          git commit -m "Update zsasa to ${VERSION}"
          git push

  update_scoop:
    name: Update Scoop bucket
    needs: [prepare, github_release]
    runs-on: ubuntu-latest
    if: >-
      always()
      && needs.prepare.result == 'success'
      && (
        (
          (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
          || (github.event_name == 'workflow_dispatch' && inputs.jobs == 'all')
        )
        && needs.github_release.result == 'success'
        || (github.event_name == 'workflow_dispatch' && inputs.jobs == 'package-managers')
      )

    steps:
      - name: Download checksums
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          gh release download "${RELEASE_TAG}" \
            --repo N283T/zsasa \
            --pattern "SHA256SUMS" \
            --dir .

      - name: Checkout bucket repo
        uses: actions/checkout@v4
        with:
          repository: N283T/scoop-zsasa
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: scoop-zsasa

      - name: Update manifest
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          WIN_HASH=$(grep "windows-x86_64" SHA256SUMS | awk '{print $1}')
          MANIFEST="scoop-zsasa/bucket/zsasa.json"

          python3 -c "
          import json
          with open('$MANIFEST') as f:
              data = json.load(f)
          data['version'] = '$VERSION'
          data['architecture']['64bit']['url'] = f'https://github.com/N283T/zsasa/releases/download/v$VERSION/zsasa-$VERSION-windows-x86_64.exe'
          data['architecture']['64bit']['hash'] = '$WIN_HASH'
          data['bin'] = [['zsasa-$VERSION-windows-x86_64.exe', 'zsasa']]
          with open('$MANIFEST', 'w') as f:
              json.dump(data, f, indent=2)
              f.write('\n')
          "

      - name: Commit and push
        working-directory: scoop-zsasa
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bucket/zsasa.json
          git diff --cached --quiet && exit 0
          git commit -m "Update zsasa to ${VERSION}"
          git push

  docker:
    name: Docker push
    needs: [prepare, build_docker]
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
      || (github.event_name == 'workflow_dispatch' && (inputs.jobs == 'all' || inputs.jobs == 'docker'))
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: version
        run: echo "version=${{ needs.prepare.outputs.version }}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/n283t/zsasa:${{ steps.version.outputs.version }}
            ghcr.io/n283t/zsasa:latest
